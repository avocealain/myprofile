<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge ENSPD-UP</title>
  <link rel="stylesheet" href="enspd.css">
</head>
<body>
  <div class="container">
    <h1>ENSPD-UP</h1>
    <h2>Rentrée solennelle 2025-2026</h2>

    <form id="badgeForm">
      <label for="name">Nom complet :</label>
      <input type="text" id="name" required>

      <label for="filiere">Filière :</label>
      <select id="filiere" required>
        <option value="Statistique Appliquée">Statistique Appliquée</option>
        <option value="Planification & Suivi Evaluation">Planification & Suivi Evaluation</option>
        <option value="Démographie">Démographie</option>
      </select>

      <label for="photo">Téléverser votre photo :</label>
      <input type="file" id="photo" accept="image/*" required>

      <button type="submit">Générer le badge</button>
    </form>

    <canvas id="badgeCanvas" width="699" height="697" style="width:100%; height:auto;"></canvas>
    <a id="downloadLink" download="badge.png">📥 Télécharger le badge</a>
  </div>

  <script src="enspd.js"></script>
</body>
</html>
