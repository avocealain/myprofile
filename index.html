<section id="contact" style="padding: 2rem; background-color: #f9f9f9;">
    <h2 style="text-align: center; margin-bottom: 1rem;">Contact Us</h2>
    <h3 style="text-align: center; margin-bottom: 2rem; color: #666;">We’d love to hear from you!</h3>
    <div style="display: flex; flex-wrap: wrap; justify-content: space-between;">
        <div style="flex: 1; min-width: 300px; margin: 1rem; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h4 style="margin-bottom: 1rem;">Get in Touch</h4>
            <p style="margin-bottom: 1rem;">
                Email: <a href="mailto:info@example.com">info@example.com</a><br>
                Phone: (555) 555-5555
            </p>
        </div>
        <div style="flex: 1; min-width: 300px; margin: 1rem; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h4 style="margin-bottom: 1rem;">Contact Form</h4>
            <form action="https://submit-form.com" method="post">
                <div style="margin-bottom: 1rem;">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;" required></textarea>
                </div>
                <button type="submit" style="background-color: #007BFF; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer;">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</section>
